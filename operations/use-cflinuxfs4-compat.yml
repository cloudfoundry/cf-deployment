- type: replace
  path: /instance_groups/name=diego-cell/jobs/name=cflinuxfs4-rootfs-setup?
  value:
    name: cflinuxfs4-rootfs-setup
    properties:
      cflinuxfs4-rootfs:
        trusted_certs:
        - ((diego_instance_identity_ca.ca))
        - ((credhub_tls.ca))
        - ((uaa_ssl.ca))
    release: cflinuxfs4-compat
- type: replace
  path: /releases/name=cflinuxfs4
  value:
    name: cflinuxfs4-compat
    sha1: sha256:a9cf55bfd7153edadbc831a55afb64601f910a3d26bc9c7ea6fa7bf3f3a5074c
    url: https://bosh.io/d/github.com/cloudfoundry/cflinuxfs4-compat-release?v=1.308.0
    version: 1.308.0
