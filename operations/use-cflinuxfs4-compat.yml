- type: replace
  path: /instance_groups/name=diego-cell/jobs/name=cflinuxfs4-rootfs-setup?
  value:
    name: cflinuxfs4-rootfs-setup
    properties:
      cflinuxfs4-rootfs:
        trusted_certs:
        - ((diego_instance_identity_ca.ca))
        - ((credhub_tls.ca))
        - ((uaa_ssl.ca))
    release: cflinuxfs4-compat
- type: replace
  path: /releases/name=cflinuxfs4
  value:
    name: cflinuxfs4-compat
    sha1: sha256:79a07c961fe2dcf5212a55c1898ed880a0f99656ce949d95d7fd857e4ee780a9
    url: https://bosh.io/d/github.com/cloudfoundry/cflinuxfs4-compat-release?v=1.307.0
    version: 1.307.0
