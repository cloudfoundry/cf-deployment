- type: replace
  path: /instance_groups/name=diego-cell/jobs/name=cflinuxfs4-rootfs-setup?
  value:
    name: cflinuxfs4-rootfs-setup
    properties:
      cflinuxfs4-rootfs:
        trusted_certs:
        - ((diego_instance_identity_ca.ca))
        - ((credhub_tls.ca))
        - ((uaa_ssl.ca))
    release: cflinuxfs4-compat
- type: replace
  path: /releases/name=cflinuxfs4
  value:
    name: cflinuxfs4-compat
    sha1: sha256:f3770f9abdaddecf11d4f3166122ae78e6f339dee8b646c5cf2a1b716c7a14e6
    url: https://bosh.io/d/github.com/cloudfoundry/cflinuxfs4-compat-release?v=1.312.0
    version: 1.312.0
