- type: replace
  path: /instance_groups/name=diego-cell/jobs/name=cflinuxfs4-rootfs-setup?
  value:
    name: cflinuxfs4-rootfs-setup
    properties:
      cflinuxfs4-rootfs:
        trusted_certs:
        - ((diego_instance_identity_ca.ca))
        - ((credhub_tls.ca))
        - ((uaa_ssl.ca))
    release: cflinuxfs4-compat
- type: replace
  path: /releases/name=cflinuxfs4
  value:
    name: cflinuxfs4-compat
    sha1: sha256:f53d889a870693409ea9c9bcff09c17f2194b49b71745880b5bb708f1bd73793
    url: https://bosh.io/d/github.com/cloudfoundry/cflinuxfs4-compat-release?v=1.313.0
    version: 1.313.0
