- type: replace
  path: /instance_groups/name=diego-cell/jobs/name=cflinuxfs4-rootfs-setup?
  value:
    name: cflinuxfs4-rootfs-setup
    properties:
      cflinuxfs4-rootfs:
        trusted_certs:
        - ((diego_instance_identity_ca.ca))
        - ((credhub_tls.ca))
        - ((uaa_ssl.ca))
    release: cflinuxfs4-compat
- type: replace
  path: /releases/name=cflinuxfs4
  value:
    name: cflinuxfs4-compat
    sha1: sha256:b9c3902292b5ed39ab6b4c6a2867c198f865c3ac6df114454ab4c289f8f93480
    url: https://bosh.io/d/github.com/cloudfoundry/cflinuxfs4-compat-release?v=1.318.0
    version: 1.318.0
