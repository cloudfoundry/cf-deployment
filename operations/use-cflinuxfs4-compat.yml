- type: replace
  path: /instance_groups/name=diego-cell/jobs/name=cflinuxfs4-rootfs-setup?
  value:
    name: cflinuxfs4-rootfs-setup
    properties:
      cflinuxfs4-rootfs:
        trusted_certs:
        - ((diego_instance_identity_ca.ca))
        - ((credhub_tls.ca))
        - ((uaa_ssl.ca))
    release: cflinuxfs4-compat
- type: replace
  path: /releases/name=cflinuxfs4
  value:
    name: cflinuxfs4-compat
    sha1: sha256:b7bc145aa937823a61237b722ecfb39b7b334c486dc514b720d96fb444448e99
    url: https://bosh.io/d/github.com/cloudfoundry/cflinuxfs4-compat-release?v=1.321.0
    version: 1.321.0
