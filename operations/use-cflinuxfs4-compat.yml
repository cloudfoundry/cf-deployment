- type: replace
  path: /instance_groups/name=diego-cell/jobs/name=cflinuxfs4-rootfs-setup?
  value:
    name: cflinuxfs4-rootfs-setup
    properties:
      cflinuxfs4-rootfs:
        trusted_certs:
        - ((diego_instance_identity_ca.ca))
        - ((credhub_tls.ca))
        - ((uaa_ssl.ca))
    release: cflinuxfs4-compat
- type: replace
  path: /releases/name=cflinuxfs4
  value:
    name: cflinuxfs4-compat
    sha1: sha256:6287085ae3240ad3b5858fab082c5908d0fd232ca8afa7536170574c0b3a85b9
    url: https://bosh.io/d/github.com/cloudfoundry/cflinuxfs4-compat-release?v=1.310.0
    version: 1.310.0
