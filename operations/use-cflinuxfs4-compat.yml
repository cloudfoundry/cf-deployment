- type: replace
  path: /instance_groups/name=diego-cell/jobs/name=cflinuxfs4-rootfs-setup?
  value:
    name: cflinuxfs4-rootfs-setup
    properties:
      cflinuxfs4-rootfs:
        trusted_certs:
        - ((diego_instance_identity_ca.ca))
        - ((credhub_tls.ca))
        - ((uaa_ssl.ca))
    release: cflinuxfs4-compat
- type: replace
  path: /releases/name=cflinuxfs4
  value:
    name: cflinuxfs4-compat
    sha1: sha256:809675774eebc5266bcc93ecef7c9957e97b5abff7f4e8c952c7fa72a5c743eb
    url: https://bosh.io/d/github.com/cloudfoundry/cflinuxfs4-compat-release?v=1.319.0
    version: 1.319.0
