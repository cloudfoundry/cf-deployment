- type: replace
  path: /addons?/-
  value:
    include:
      stemcell:
      - os: ubuntu-bionic
      - os: ubuntu-jammy
      - os: ubuntu-noble
    jobs:
    - name: syslog_forwarder
      properties:
        syslog:
          address: ((syslog_address))
          custom_rule: |
            ((syslog_custom_rule))
            if ($programname startswith "vcap.") then stop
          fallback_servers: ((syslog_fallback_servers))
          permitted_peer: ((syslog_permitted_peer))
          port: ((syslog_port))
          tls_enabled: true
          transport: tcp
      release: syslog
    name: syslog_forwarder
- type: replace
  path: /releases/-
  value:
    name: syslog
    sha1: sha256:446f01276a1972a66b108efc5ee756b662d6084447f82392a3e330c703ee2df7
    url: https://bosh.io/d/github.com/cloudfoundry/syslog-release?v=12.3.23
    version: 12.3.23
